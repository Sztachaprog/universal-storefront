services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: storefront
    ports:
      - "5433:5432"

  admin-panel:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@storefront.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"